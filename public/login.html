<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center;">Member Login</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button type="submit">Login</button>
    </div>
    <script>
        async function doLogin() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u.value, password: p.value})
            });
            const data = await res.json();
            if(data.success) window.location.href = `/dashboard.html?user=${data.user}&bal=${data.bal}`;
            else alert("Invalid Login");
        }
    </script>
</body>
</html>
